on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

    - name: Set up Python
      run: uv python install

    - name: Build exe
      run: ./build_exe.bat

    - name: Release
      uses: softprops/action-gh-release@v3
      with:
          files: |
            dist/*.exe
            LICENSE.txt